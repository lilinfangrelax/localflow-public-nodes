<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalFlow Collector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #f8f9fa;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      text-align: center;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { font-size: 11px; opacity: 0.85; margin-top: 4px; }
    .section { padding: 12px 16px; border-bottom: 1px solid #e9ecef; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #868e96;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .input-group { margin-bottom: 8px; }
    .input-group label {
      display: block;
      font-size: 12px;
      color: #495057;
      margin-bottom: 4px;
    }
    .input-group input {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: #667eea; }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .status-bar.connected { background: #d3f9d8; color: #2b8a3e; }
    .status-bar.disconnected { background: #ffe3e3; color: #c92a2a; }
    .status-bar.collecting { background: #d0ebff; color: #1864ab; }
    .status-bar.error { background: #ffe3e3; color: #c92a2a; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .connected .status-dot { background: #40c057; }
    .disconnected .status-dot { background: #fa5252; }
    .collecting .status-dot { background: #339af0; animation: pulse 1.5s infinite; }
    .error .status-dot { background: #fa5252; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-connect { background: #667eea; color: white; }
    .btn-connect:hover:not(:disabled) { background: #5a67d8; }
    .btn-disconnect { background: #fa5252; color: white; }
    .btn-disconnect:hover:not(:disabled) { background: #e03131; }
    .btn-collect { background: #339af0; color: white; }
    .btn-collect:hover:not(:disabled) { background: #228be6; }
    .btn-stop { background: #fd7e14; color: white; }
    .btn-stop:hover:not(:disabled) { background: #e8590c; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .stat-card {
      background: white;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      padding: 8px 12px;
      text-align: center;
    }
    .stat-value { font-size: 18px; font-weight: 700; color: #667eea; }
    .stat-label { font-size: 10px; color: #868e96; margin-top: 2px; }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #495057;
    }
    .checkbox-item input[type="checkbox"] { margin: 0; }
    .footer {
      padding: 8px 16px;
      text-align: center;
      font-size: 10px;
      color: #adb5bd;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>LocalFlow Collector</h1>
    <p>浏览器数据收集插件</p>
  </div>

  <div class="section">
    <div class="section-title">连接状态</div>
    <div id="statusBar" class="status-bar disconnected">
      <div class="status-dot"></div>
      <span id="statusText">未连接</span>
    </div>
    <div class="input-group">
      <label>WebSocket 地址</label>
      <input type="text" id="wsUrl" value="ws://localhost:8765" placeholder="ws://host:port">
    </div>
    <div class="btn-row">
      <button id="btnConnect" class="btn btn-connect">连接</button>
      <button id="btnDisconnect" class="btn btn-disconnect" disabled>断开</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">数据收集</div>
    <div class="section-title" style="margin-top:4px; font-size:10px; text-transform:none; letter-spacing:0;">收集类型</div>
    <div class="checkbox-group">
      <label class="checkbox-item"><input type="checkbox" id="chkPageInfo" checked> 页面信息</label>
      <label class="checkbox-item"><input type="checkbox" id="chkNetwork" checked> 网络请求</label>
      <label class="checkbox-item"><input type="checkbox" id="chkConsole" checked> 控制台</label>
      <label class="checkbox-item"><input type="checkbox" id="chkDomEvent"> DOM事件</label>
    </div>
    <div class="btn-row" style="margin-top:10px;">
      <button id="btnStartCollect" class="btn btn-collect" disabled>开始收集</button>
      <button id="btnStopCollect" class="btn btn-stop" disabled>停止收集</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">统计</div>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="sentCount">0</div>
        <div class="stat-label">已发送消息</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="maxMessages">100</div>
        <div class="stat-label">最大消息数</div>
      </div>
    </div>
  </div>

  <div class="footer">LocalFlow Web Collector v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
